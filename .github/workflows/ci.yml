name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make libreadline-dev

      - name: Strict build
        run: |
          make clean
          make CFLAGS="-Wall -Wextra -Wpedantic -Werror -std=gnu11 -g -O2"

      - name: Test
        run: |
          make test

      - name: Audit
        run: |
          make audit

      - name: Upload audit evidence
        uses: actions/upload-artifact@v4
        with:
          name: icare-cyber-lab-audit
          path: audit/_latest/
